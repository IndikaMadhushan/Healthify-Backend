version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: healthy_mysql
    restart: always
    environment:
      MYSQL_DATABASE: healthy
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: healthy_user
      MYSQL_PASSWORD: healthy_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    image: numidu/ampora_backend:latest
    container_name: ampora_backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ampora
      SPRING_DATASOURCE_USERNAME: healthy_user
      SPRING_DATASOURCE_PASSWORD: healthy_pass
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SERVER_PORT: 8083

volumes:
  mysql_data: