version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: healthy_mysql
    restart: always
    environment:
      MYSQL_DATABASE: healthy
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: healthy_user
      MYSQL_PASSWORD: healthy_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: healthy_backend:local
    container_name: healthy_backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/healthy?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DATABASE_USERNAME: healthy_user
      DATABASE_PASSWORD: healthy_pass
      SERVER_PORT: 8083

volumes:
  mysql_data:
